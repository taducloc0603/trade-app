name: Build and Release Windows App

on:
  push:
    branches: [ dev ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      APP_NAME: TradeDesktop.App
      MAJOR: 1
      MINOR: 0

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Generate version
        shell: pwsh
        run: |
          $version="${{ env.MAJOR }}.${{ env.MINOR }}.${{ github.run_number }}"
          echo "VERSION=$version" >> $env:GITHUB_ENV
          echo "VERSIONED_EXE=${{ env.APP_NAME }}-$version.exe" >> $env:GITHUB_ENV
          echo "LATEST_EXE=${{ env.APP_NAME }}-latest.exe" >> $env:GITHUB_ENV
          echo "TAG=v$version" >> $env:GITHUB_ENV

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish TradeDesktop.App/TradeDesktop.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:Version=${{ env.VERSION }} `
            /p:AssemblyVersion=${{ env.VERSION }} `
            /p:FileVersion=${{ env.VERSION }} `
            -o publish

      - name: Prepare release files
        shell: pwsh
        run: |
          Copy-Item "publish/${{ env.APP_NAME }}.exe" "publish/${{ env.VERSIONED_EXE }}"
          Copy-Item "publish/${{ env.APP_NAME }}.exe" "publish/${{ env.LATEST_EXE }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Release ${{ env.VERSION }}
          files: |
            publish/${{ env.VERSIONED_EXE }}
            publish/${{ env.LATEST_EXE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}